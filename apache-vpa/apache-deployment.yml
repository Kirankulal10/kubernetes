apiVersion: apps/v1
kind: Deployment

metadata:
  name: apache-deployment
  namespace: apache-namespace

spec:
  replicas: 1

  selector:
    matchLabels:
      app: apache-label

  template:
    metadata:
      labels:
        app: apache-label

    spec:
      containers:
      - name: apache-container
        image: httpd:latest

        ports:
        - containerPort: 80

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
