apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notes-app-hpa
  namespace: notes-app-namespace
spec:
  scaleTargetRef:                  #for what to create replica
    apiVersion: apps/v1
    kind: Deployment        #for deployment 
    name: notes-app-deployment
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 20
