apiVersion: v1
kind: Pod
metadata:
  name: init-test-container-notinit-not-main
spec:

  initContainers:
  - name: init-container
    image: busybox
    command: ["sh","-c","echo 'Initialization started..'; sleep 10; echo 'Initialisation completed'"]

  containers:
  - name: main-container
    image: busybox:latest
    command: ["sh","-c","echo 'Main container started'"]
