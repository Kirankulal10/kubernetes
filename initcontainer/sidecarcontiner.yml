apiVersion: v1
kind: Pod
metadata:
  name: sidecar-container-pod
spec:
  volumes:
  -  name: shared-logs
     emptyDir: {}
  containers:
  - name: main-container
    image: busybox:latest
    command: ["sh","-c","while true; do echo 'hello namaskara' >> /var/log/app.log; sleep 5; done "]
    volumeMounts:
    - name: shared-logs
      mountPath: /var/log

  - name: side-car-container
    image: busybox:latest
    command:
    - sh
    - -c
    - |
      tail -f /var/log/app.log
    volumeMounts:
    - name: shared-logs
      mountPath: /var/log

